<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>スクショ受付</title>
<style>
  html,body{margin:0;height:100%;background:#0b0e18;color:#f3ece0;font-family:-apple-system,'Hiragino Sans',sans-serif;}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:12px;box-sizing:border-box;text-align:center;}
  .big{font-size:16px;padding:14px 26px;border-radius:10px;border:1px solid rgba(243,236,224,.4);background:#1c2233;color:#f3ece0;}
  .note{font-size:12px;opacity:.78;line-height:1.6;}
  a{color:#9db8ff;font-size:12px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="note" id="msg">軽い受付ページですの。ここなら写真選択で落ちませんわ。</div>
  <button type="button" class="big" onclick="document.getElementById('f').click()">📷 写真を選ぶ</button>
  <input type="file" id="f" accept="image/*" style="display:none">
  <a href="koushu-handan.html">← 本体へ戻る</a>
</div>
<script>
(function(){
  var msg = document.getElementById('msg');
  document.getElementById('f').addEventListener('change', function(ev){
    var file = ev.target.files && ev.target.files[0];
    if(!file) return;
    msg.textContent = '受け取りましたわ。縮小して本体へ運びますの…';
    var url = URL.createObjectURL(file);
    var img = new Image();
    img.onload = function(){
      try{
        var sc = Math.min(1, 1280 / img.width);
        var cv = document.createElement('canvas');
        cv.width = Math.round(img.width * sc);
        cv.height = Math.round(img.height * sc);
        cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
        var data = cv.toDataURL('image/jpeg', 0.85);
        localStorage.setItem('ssHandoff', data);
        localStorage.setItem('ssResumeAt', String(Date.now()));
        URL.revokeObjectURL(url);
        location.replace('koushu-handan.html');
      }catch(e){
        msg.textContent = '預かりに失敗しましたわ: ' + e.message;
      }
    };
    img.onerror = function(){
      URL.revokeObjectURL(url);
      msg.textContent = '画像を読み込めませんでしたわ。もう一度お選びくださいまし';
    };
    img.src = url;
    ev.target.value = '';
  });
})();
</script>
</body>
</html>
